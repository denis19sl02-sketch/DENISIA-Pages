<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENISIA PAGES | SUPREME NETWORK</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #050505;
            --panel: #111;
            --green: #0bfe0b;
            --warn: #ff0055;
        }

        body {
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER SYSTEM --- */
        header {
            padding: 10px 20px;
            background: #000;
            border-bottom: 2px solid var(--neon);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            z-index: 1000;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .status-bar { font-size: 10px; color: var(--green); text-transform: uppercase; margin-top: 2px; }

        /* --- MAIN LAYOUT --- */
        main { display: flex; flex: 1; overflow: hidden; }

        /* EDITOR */
        #editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        #code-input {
            flex: 1;
            background: #000;
            color: var(--green);
            padding: 25px;
            font-size: 16px;
            border: none;
            outline: none;
            resize: none;
            line-height: 1.5;
        }

        .action-bar {
            padding: 15px;
            background: var(--panel);
            display: flex;
            gap: 12px;
            border-top: 1px solid #333;
        }

        /* SIDEBAR (SITES & LOGS) */
        #sidebar {
            width: 420px;
            background: #080808;
            border-left: 2px solid #222;
            display: flex;
            flex-direction: column;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

        /* --- UI COMPONENTS --- */
        .site-card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .site-card:hover { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.1); }
        .site-card h4 { margin: 0 0 10px 0; color: var(--neon); font-size: 18px; }

        .url-display {
            background: #000;
            padding: 8px;
            font-size: 11px;
            color: #ffff00;
            border: 1px dashed #444;
            margin: 10px 0;
            word-break: break-all;
        }

        /* NETWORK MONITOR */
        #network-monitor {
            height: 200px;
            background: #000;
            border-top: 2px solid #222;
            padding: 10px;
            font-size: 11px;
            overflow-y: auto;
            color: var(--green);
        }
        .log-entry { border-bottom: 1px solid #111; padding: 4px 0; }
        .log-tag { color: var(--neon); font-weight: bold; }

        /* BUTTONS */
        button {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .btn-danger { border-color: var(--warn); color: var(--warn); }
        .btn-danger:hover { background: var(--warn); color: #fff; }

        /* VIEWPORT */
        #viewport {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 9999;
        }
        .close-viewport {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--warn);
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 11000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="loader">
    <div class="logo">DENISIA NETWORK</div>
    <p>ГЕНЕРАЦИЯ NANO-URL... ПОДОЖДИТЕ</p>
</div>

<header>
    <div class="logo-area">
        <div class="logo">DENISIA PAGES SUPREME</div>
        <div class="status-bar" id="sys-status">SATELLITE LINK ACTIVE // CHANNEL: denisia_comms</div>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main>
    <div id="editor-container">
        <textarea id="code-input" placeholder="<script>
  // Твои сайты могут общаться так:
  const bus = new BroadcastChannel('denisia_comms');
  bus.postMessage({msg: 'Привет из моего сайта!'});
</script>"></textarea>
        
        <div class="action-bar">
            <button onclick="deploy()">ОПУБЛИКОВАТЬ В ГЛОБАЛЬНУЮ СЕТЬ</button>
            <button class="btn-danger" onclick="resetDB()">УДАЛИТЬ ВСЕ САЙТЫ</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="scroll-area">
            <h3 style="color: var(--neon); border-bottom: 1px solid #333; padding-bottom: 10px;">МОИ ПРОЕКТЫ</h3>
            <div id="site-list"></div>
        </div>

        <div id="network-monitor">
            <div style="color: #666; margin-bottom: 5px;">[ NETWORK MONITOR ]</div>
            <div id="log-container"></div>
        </div>
    </div>
</main>

<div id="viewport">
    <button class="close-viewport" onclick="closeViewport()">ЗАКРЫТЬ ПРОСМОТР</button>
    <iframe id="viewer"></iframe>
</div>

<script>
    const STORAGE_KEY = "DENISIA_SUPREME_STORAGE";
    
    // СЕТЕВАЯ ШИНА (МЕЖДУ САЙТАМИ)
    const denisiaBus = new BroadcastChannel('denisia_comms');
    
    denisiaBus.onmessage = (e) => {
        addLog("RECEIVED", JSON.stringify(e.data));
    };

    // Запуск системы
    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        checkIncomingGlobalLink();
        renderProjects();
    };

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    function addLog(type, msg) {
        const container = document.getElementById('log-container');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-tag">[${type}]</span> ${msg}`;
        container.prepend(entry);
    }

    // ГЛАВНАЯ ФУНКЦИЯ ДЕПЛОЯ
    async function deploy() {
        const code = document.getElementById('code-input').value;
        if (!code) return alert("ОШИБКА: Код отсутствует!");

        const name = prompt("Название проекта:", "PROJECT_" + Math.random().toString(36).substring(7).toUpperCase());
        if (!name) return;

        document.getElementById('loader').style.display = 'flex';

        // 1. Кодируем код для ссылки
        const encoded = btoa(unescape(encodeURIComponent(code)));
        const fullUrl = window.location.origin + window.location.pathname + "?dn=" + encoded;

        let shortUrl = fullUrl;

        // 2. Сокращаем через API (в 20 раз короче)
        try {
            const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(fullUrl)}`);
            if (response.ok) {
                shortUrl = await response.text();
            }
        } catch (err) {
            console.error("Shortener Error, using long link");
        }

        // 3. Сохраняем в локальную базу
        const db = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        db.push({
            id: Date.now(),
            name: name,
            url: shortUrl,
            code: code
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));

        document.getElementById('loader').style.display = 'none';
        document.getElementById('code-input').value = "";
        addLog("SYSTEM", `Сайт "${name}" успешно опубликован.`);
        renderProjects();
    }

    // Отрисовка списка
    function renderProjects() {
        const container = document.getElementById('site-list');
        const db = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        container.innerHTML = "";

        db.reverse().forEach(site => {
            const card = document.createElement('div');
            card.className = 'site-card';
            card.innerHTML = `
                <h4>${site.name}</h4>
                <div class="url-display">${site.url}</div>
                <button onclick="openSite('${site.id}')">ЗАПУСТИТЬ</button>
                <button onclick="copyToClipboard('${site.url}')" style="font-size:10px;">КОПИРОВАТЬ URL</button>
            `;
            container.appendChild(card);
        });
    }

    function openSite(id) {
        const db = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const site = db.find(s => s.id == id);
        if (site) {
            const blob = new Blob([site.code], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            document.getElementById('viewer').src = url;
            document.getElementById('viewport').style.display = 'block';
            addLog("LAUNCH", `Запуск проекта: ${site.name}`);
        }
    }

    // Проверка глобальной ссылки при входе
    function checkIncomingGlobalLink() {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('dn');
        if (data) {
            try {
                const decoded = decodeURIComponent(escape(atob(data)));
                document.open();
                document.write(decoded);
                document.close();
            } catch (e) {
                addLog("ERROR", "Не удалось расшифровать входящий сайт.");
            }
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert("Nano-URL скопирован в буфер обмена!");
            addLog("SYSTEM", "Ссылка скопирована.");
        });
    }

    function closeViewport() {
        document.getElementById('viewport').style.display = 'none';
        document.getElementById('viewer').src = '';
    }

    function resetDB() {
        if (confirm("ВНИМАНИЕ! Это удалит все сохраненные сайты навсегда. Продолжить?")) {
            localStorage.removeItem(STORAGE_KEY);
            renderProjects();
            addLog("SYSTEM", "База данных очищена.");
        }
    }
</script>

</body>
</html>
