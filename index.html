<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denisia Pages</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#00d4ff;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{background:#000;border-bottom:2px solid #00d4ff;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 0 20px rgba(0,212,255,.25);}
.logo{font-size:19px;font-weight:900;color:#00d4ff;text-shadow:0 0 18px #00d4ff;letter-spacing:2px;white-space:nowrap;}
.logo span{color:#fff;}
.sp{flex:1;}
.btn{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:700;font-family:'Courier New',monospace;cursor:pointer;border:2px solid #00d4ff;background:#000;color:#00d4ff;transition:all .18s;white-space:nowrap;}
.btn:hover{background:#00d4ff;color:#000;box-shadow:0 0 16px #00d4ff;}
.btn-run{border-color:#00ff88;color:#00ff88;}
.btn-run:hover{background:#00ff88;color:#000;box-shadow:0 0 16px #00ff88;}
.btn-clr{border-color:#ff3333;color:#ff3333;}
.btn-clr:hover{background:#ff3333;color:#fff;box-shadow:0 0 16px #ff3333;}
.btn-apk{border-color:#ff6600;color:#ff6600;animation:apkglow 2.5s ease-in-out infinite;}
@keyframes apkglow{0%,100%{box-shadow:0 0 8px rgba(255,102,0,.2);}50%{box-shadow:0 0 20px rgba(255,102,0,.6);}}
.btn-apk:hover{background:#ff6600;color:#fff;box-shadow:0 0 24px #ff6600;animation:none;}

/* TABS */
.tabs{display:flex;background:#000;border-bottom:2px solid #00d4ff;padding:0 16px;flex-shrink:0;}
.tab{padding:7px 20px;font-size:12px;font-weight:700;font-family:'Courier New',monospace;cursor:pointer;border:none;border-bottom:3px solid transparent;background:transparent;color:#005577;transition:all .18s;margin-bottom:-2px;}
.tab.active{color:#00d4ff;border-bottom-color:#00d4ff;text-shadow:0 0 8px #00d4ff;}
.tab:hover{color:#00aadd;}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;}
.ed-side{width:50%;display:flex;flex-direction:column;border-right:2px solid #00d4ff;min-width:60px;}
.side-lbl{background:#000;border-bottom:1px solid #003344;padding:4px 12px;font-size:10px;color:#005577;letter-spacing:2px;flex-shrink:0;}
.ed-box{flex:1;display:flex;overflow:hidden;}
.lnums{background:#030303;border-right:1px solid #001a22;padding:12px 6px;font-size:12px;line-height:1.6;color:#003344;text-align:right;min-width:40px;overflow:hidden;user-select:none;flex-shrink:0;}
textarea{flex:1;background:#000;color:#00d4ff;font-family:'Courier New',monospace;font-size:12px;line-height:1.6;padding:12px 12px;border:none;outline:none;resize:none;caret-color:#00ff88;overflow:auto;white-space:pre;tab-size:2;}
textarea::selection{background:rgba(0,212,255,.22);}

.resizer{width:5px;background:#001a22;cursor:col-resize;flex-shrink:0;transition:background .18s;}
.resizer:hover{background:#00d4ff;}

.prev-side{flex:1;display:flex;flex-direction:column;min-width:60px;}
.prev-bar{background:#000;border-bottom:1px solid #003344;padding:4px 8px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.url-box{flex:1;background:#030808;border:1px solid #003344;border-radius:20px;padding:3px 10px;font-size:11px;color:#005577;display:flex;align-items:center;gap:5px;overflow:hidden;transition:all .3s;}
.url-box.live{border-color:#00d4ff;color:#00d4ff;}
.ldot{width:6px;height:6px;border-radius:50%;background:#222;flex-shrink:0;}
.url-box.live .ldot{background:#00ff88;box-shadow:0 0 5px #00ff88;animation:blink 2s infinite;}
@keyframes blink{50%{opacity:.4;}}
.utext{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ibtn{background:none;border:1px solid #003344;border-radius:4px;color:#005577;cursor:pointer;padding:3px 6px;font-size:12px;transition:all .14s;}
.ibtn:hover{color:#00d4ff;border-color:#00d4ff;}

iframe#pf{flex:1;border:none;width:100%;background:#fff;display:none;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.eico{font-size:44px;opacity:.1;}
.etxt{font-size:12px;color:#003344;text-align:center;line-height:2;}
.etxt b{color:#00d4ff;}

.bottom{background:#000;border-top:1px solid #001a22;padding:3px 14px;display:flex;align-items:center;gap:12px;font-size:10px;color:#003344;flex-shrink:0;}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.open{opacity:1;pointer-events:all;}

/* DL MODAL */
.dlm{background:#000;border:2px solid #00d4ff;border-radius:12px;padding:24px;width:380px;box-shadow:0 0 40px rgba(0,212,255,.22);transform:scale(.95);transition:transform .2s;}
.ov.open .dlm{transform:scale(1);}
.mt{color:#00d4ff;font-size:17px;letter-spacing:2px;margin-bottom:14px;text-shadow:0 0 10px #00d4ff;}
.dr{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #003344;border-radius:7px;cursor:pointer;margin-bottom:7px;background:#050a0d;color:#00d4ff;font-family:'Courier New',monospace;transition:all .14s;text-align:left;}
.dr:hover{border-color:#00d4ff;background:#001a22;}
.dem{font-size:20px;flex-shrink:0;}
.dt{font-size:12px;font-weight:700;display:block;}
.ds{font-size:10px;color:#005577;display:block;margin-top:1px;}

/* APK MODAL */
.apkm{background:#05020
0;border:2px solid #ff6600;border-radius:14px;padding:26px;width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 0 50px rgba(255,102,0,.35);transform:scale(.95);transition:transform .2s;}
.ov.open .apkm{transform:scale(1);}
.apkt{font-size:20px;font-weight:900;color:#ff6600;text-shadow:0 0 15px #ff6600;letter-spacing:2px;margin-bottom:3px;}
.apks{color:#552200;font-size:10px;letter-spacing:1px;margin-bottom:18px;}

/* FORM */
.frow{margin-bottom:14px;}
.flbl{font-size:10px;color:#883300;letter-spacing:1px;margin-bottom:5px;display:block;}
.finp{width:100%;background:#0a0300;border:1px solid #552200;border-radius:6px;padding:9px 12px;font-family:'Courier New',monospace;font-size:13px;color:#ff8844;outline:none;transition:border-color .18s;}
.finp:focus{border-color:#ff6600;box-shadow:0 0 8px rgba(255,102,0,.2);}

/* ICON PICKER */
.icon-section{margin-bottom:16px;}
.icon-preview-wrap{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.icon-preview{width:72px;height:72px;border-radius:16px;border:2px solid #552200;background:#0a0300;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;flex-shrink:0;}
.icon-preview img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
.icon-btns{display:flex;flex-direction:column;gap:6px;}
.ipick-btn{padding:7px 14px;border-radius:5px;font-size:11px;font-weight:700;font-family:'Courier New',monospace;cursor:pointer;border:1px solid #552200;background:#0a0300;color:#ff6600;transition:all .15s;white-space:nowrap;}
.ipick-btn:hover{border-color:#ff6600;background:#150800;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;background:#080200;border:1px solid #331100;border-radius:8px;padding:8px;margin-top:6px;}
.eg-btn{background:none;border:1px solid transparent;border-radius:5px;font-size:20px;cursor:pointer;padding:4px;transition:all .14s;line-height:1;}
.eg-btn:hover{background:#1a0800;border-color:#ff6600;}
.eg-btn.selected{background:#2a0e00;border-color:#ff6600;box-shadow:0 0 8px rgba(255,102,0,.4);}

/* BIG BTN */
.gobtn{width:100%;padding:15px;background:linear-gradient(135deg,#ff6600,#ff3300);border:none;border-radius:9px;color:#fff;font-family:'Courier New',monospace;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;box-shadow:0 0 22px rgba(255,102,0,.45);transition:all .2s;margin-bottom:8px;}
.gobtn:hover{box-shadow:0 0 40px rgba(255,102,0,.8);transform:translateY(-2px);}
.gobtn:disabled{opacity:.5;cursor:default;transform:none;}

.cbtn{width:100%;padding:8px;background:none;border:1px solid #331100;border-radius:5px;color:#552200;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;transition:all .14s;}
.cbtn:hover{color:#ff6600;border-color:#ff6600;}

/* STATUS BOX */
.status-box{background:#080200;border:1px solid #331100;border-radius:8px;padding:12px;margin-bottom:12px;display:none;}
.status-box.show{display:block;}
.sb-line{font-size:11px;color:#cc5500;margin-bottom:4px;line-height:1.6;}
.sb-line b{color:#ff8844;}
.sb-line a{color:#ff6600;text-decoration:none;}
.sb-line a:hover{text-decoration:underline;}
.sb-prog{height:3px;background:#1a0800;border-radius:2px;margin-top:8px;overflow:hidden;}
.sb-bar{height:100%;background:#ff6600;border-radius:2px;width:0%;transition:width .4s;}

/* TOAST */
.toast{position:fixed;bottom:30px;right:14px;background:#000;padding:8px 16px;border-radius:6px;font-size:12px;font-family:'Courier New',monospace;transform:translateY(14px);opacity:0;transition:all .2s;z-index:9999;pointer-events:none;border:1px solid #00ff88;color:#00ff88;box-shadow:0 0 14px rgba(0,255,136,.3);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{border-color:#ff4400;color:#ff4400;box-shadow:0 0 14px rgba(255,68,0,.3);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#000;}
::-webkit-scrollbar-thumb{background:#003344;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#00d4ff;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">DENISIA<span>PAGES</span></div>
  <div class="sp"></div>
  <button class="btn btn-clr" onclick="clearCode()">🗑 ОЧИСТИТЬ</button>
  <button class="btn btn-run" onclick="runCode()">▶ ЗАПУСТИТЬ</button>
  <button class="btn" onclick="openDL()">⬇ СКАЧАТЬ</button>
  <button class="btn btn-apk" onclick="openAPK()">📱 СОБРАТЬ APK</button>
</div>

<div class="tabs">
  <button class="tab active" id="t-html" onclick="switchTab('html')">HTML</button>
  <button class="tab" id="t-css" onclick="switchTab('css')">CSS</button>

</div>

<div class="main">
  <div class="ed-side" id="edSide">
    <div class="side-lbl">[ КОД РЕДАКТОР ]</div>
    <div class="ed-box">
      <div class="lnums" id="lnums">1</div>
      <textarea id="ed" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="prev-side">
    <div class="prev-bar">
      <div class="url-box" id="urlBox">
        <div class="ldot"></div>
        <span class="utext" id="urlTxt">denisia.pages — нажми ЗАПУСТИТЬ</span>
      </div>

      <button class="ibtn" onclick="openTab()">⛶</button>
    </div>
    <div class="empty" id="empty">
      <div class="eico">🚀</div>
      <div class="etxt">Напиши HTML и нажми<br><b>▶ ЗАПУСТИТЬ</b> или <b>Ctrl+Enter</b></div>
    </div>
    <iframe id="pf"></iframe>
  </div>
</div>

<div class="bottom">
  <span>DENISIA PAGES</span><span>|</span>
  <span>Стр:<b id="bL">1</b> Кол:<b id="bC">1</b></span><span>|</span>
  <span id="bSt">✏ Редактирование</span>
</div>

<!-- OVERLAY -->
<div class="ov" id="ov">

  <!-- DL MODAL -->
  <div class="dlm" id="dlModal" style="display:none">
    <div class="mt">⬇ СКАЧАТЬ</div>
    <button class="dr" onclick="dlHTML()"><span class="dem">🌐</span><span><span class="dt">HTML файл</span><span class="ds">Весь сайт в одном .html файле</span></span></button>
    <button class="dr" onclick="dlF('css')"><span class="dem">🎨</span><span><span class="dt">CSS файл</span><span class="ds">style.css</span></span></button>
    <button class="dr" onclick="dlF('js')"><span class="dem">⚡</span><span><span class="dt">JS файл</span><span class="ds">script.js</span></span></button>
    <button class="cbtn" style="border-color:#003344;color:#005577;margin-top:4px;" onclick="closeOv()">✕ ЗАКРЫТЬ</button>
  </div>

  <!-- APK MODAL -->
  <div class="apkm" id="apkModal" style="display:none">
    <div class="apkt">📱 СОБРАТЬ APK</div>
    <div class="apks">ТВОЙ КОД → НАСТОЯЩИЙ ANDROID APK</div>

    <!-- APP NAME -->
    <div class="frow">
      <span class="flbl">НАЗВАНИЕ ПРИЛОЖЕНИЯ:</span>
      <input class="finp" id="appName" type="text" value="Моё приложение" maxlength="30">
    </div>

    <!-- ICON PICKER -->
    <div class="icon-section">
      <span class="flbl">ИКОНКА ПРИЛОЖЕНИЯ:</span>
      <div class="icon-preview-wrap">
        <div class="icon-preview" id="iconPreview">🚀</div>
        <div class="icon-btns">
          <button class="ipick-btn" onclick="document.getElementById('iconFile').click()">📁 Выбрать из галереи</button>
          <button class="ipick-btn" onclick="toggleEmoji()">😀 Выбрать эмодзи</button>
          <button class="ipick-btn" onclick="resetIcon()">↩ Сбросить</button>
        </div>

      <div class="emoji-grid" id="emojiGrid" style="display:none">
        <button class="eg-btn" onclick="setEmoji('🚀')">🚀</button>
        <button class="eg-btn" onclick="setEmoji('🔥')">🔥</button>

        <button class="eg-btn" onclick="setEmoji('🛸')">🛸</button>
        <button class="eg-btn" onclick="setEmoji('🤖')">🤖</button>
        <button class="eg-btn" onclick="setEmoji('👾')">👾</button>
        <button class="eg-btn" onclick="setEmoji('🎵')">🎵</button>
        <button class="eg-btn" onclick="setEmoji('🎨')">🎨</button>
        <button class="eg-btn" onclick="setEmoji('📱')">📱</button>
        <button class="eg-btn" onclick="setEmoji('💻')">💻</button>
        <button class="eg-btn" onclick="setEmoji('🌍')">🌍</button>
        <button class="eg-btn" onclick="setEmoji('🏆')">🏆</button>

        <button class="eg-btn" onclick="setEmoji('❄️')">❄️</button>
        <button class="eg-btn" onclick="setEmoji('🌊')">🌊</button>
        <button class="eg-btn" onclick="setEmoji('⚔️')">⚔️</button>
        <button class="eg-btn" onclick="setEmoji('🎃')">🎃</button>
        <button class="eg-btn" onclick="setEmoji('💀')">💀</button>
      </div>

    <!-- STATUS -->
    <div class="status-box" id="statusBox">
      <div class="sb-line" id="sb1">⏳ Подготовка...</div>
      <div class="sb-line" id="sb2"></div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const code = {
  html:`<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой сайт</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#000;color:#00d4ff;
      font-family:'Courier New',monospace;
      min-height:100vh;display:flex;
      align-items:center;justify-content:center;text-align:center;padding:20px;
    }
    h1{font-size:2.8rem;animation:glow 2s ease-in-out infinite alternate;margin-bottom:12px;}
    @keyframes glow{
      from{text-shadow:0 0 20px #00d4ff;}
      to{text-shadow:0 0 50px #00d4ff,0 0 80px #00d4ff;}
    }
    p{color:#005577;font-size:1.1rem;margin-bottom:22px;}
    button{
      padding:12px 30px;border:2px solid #00d4ff;
      background:#000;color:#00d4ff;
      font-family:'Courier New',monospace;font-size:15px;font-weight:700;
      cursor:pointer;border-radius:6px;letter-spacing:2px;
      transition:all .2s;box-shadow:0 0 14px rgba(0,212,255,.3);
    }
    button:hover{background:#00d4ff;color:#000;box-shadow:0 0 28px #00d4ff;transform:scale(1.05);}
  </style>
</head>
<body>
  <div>
    <h1>DENISIA PAGES</h1>
    <p>Твой первый сайт работает!</p>
    <button onclick="this.textContent='РАБОТАЕТ! 🔥'">НАЖМИ МЕНЯ</button>
  </div>
</body>
</html>`,
  css:`/* Дополнительный CSS */\n`,
  js:`// Дополнительный JS\nconsole.log('Denisia Pages!');\n`
};

let activeTab='html', iconDataUrl=null, selectedEmoji='🚀';
const ed=document.getElementById('ed');
const lnums=document.getElementById('lnums');

ed.value=code.html; updateLines(); setTimeout(runCode,300);

function switchTab(t){
  code[activeTab]=ed.value; activeTab=t; ed.value=code[t];
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('t-'+t).classList.add('active');
  updateLines(); ed.focus();
}

function updateLines(){
  const n=ed.value.split('\n').length; let s='';
  for(let i=1;i<=n;i++) s+=i+'\n';
  lnums.textContent=s;
}

ed.addEventListener('scroll',()=>{lnums.scrollTop=ed.scrollTop;});
ed.addEventListener('input',()=>{code[activeTab]=ed.value;updateLines();});
ed.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=ed.selectionStart;
    ed.value=ed.value.slice(0,s)+'  '+ed.value.slice(ed.selectionEnd);
    ed.selectionStart=ed.selectionEnd=s+2; updateLines();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();dlHTML();}
});
ed.addEventListener('keyup',cur); ed.addEventListener('click',cur);
function cur(){
  const lines=ed.value.slice(0,ed.selectionStart).split('\n');
  document.getElementById('bL').textContent=lines.length;
  document.getElementById('bC').textContent=lines[lines.length-1].length+1;
}

// CLEAR
function clearCode(){
  if(confirm('Очистить код в табе "'+activeTab.toUpperCase()+'"?')){
    ed.value=''; code[activeTab]=''; updateLines();
    toast('🗑 Код очищен');
  }
}

function buildHTML(){
  let h=code.html;
  if(code.css.trim()) h=h.replace('</head>','<style>\n'+code.css+'\n</style>\n</head>');
  if(code.js.trim()) h=h.replace('</body>','<scr'+'ipt>\n'+code.js+'\n</scr'+'ipt>\n</body>');
  return h;
}

function runCode(){
  code[activeTab]=ed.value;
  setTimeout(()=>{
    const f=document.getElementById('pf');
    f.srcdoc=buildHTML(); f.style.display='block';
    document.getElementById('empty').style.display='none';
    document.getElementById('urlBox').classList.add('live');
    document.getElementById('urlTxt').textContent='denisia.pages/preview — LIVE';
    document.getElementById('bSt').textContent='✅ Запущен';
    toast('✅ Сайт запущен!');
  },80);
}

function reloadPrev(){if(document.getElementById('pf').style.display!=='none') runCode();}
function openTab(){
  code[activeTab]=ed.value;
  const w=window.open('','_blank');
  w.document.open(); w.document.write(buildHTML()); w.document.close();
}

// MODALS
const ov=document.getElementById('ov');
function openDL(){document.getElementById('dlModal').style.display='block';document.getElementById('apkModal').style.display='none';ov.classList.add('open');}
function openAPK(){document.getElementById('dlModal').style.display='none';document.getElementById('apkModal').style.display='block';ov.classList.add('open');}
function closeOv(){ov.classList.remove('open');}
ov.addEventListener('click',e=>{if(e.target===ov) closeOv();});

// DOWNLOAD
function dl(c,n,m){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function dlHTML(){closeOv();code[activeTab]=ed.value;dl(buildHTML(),'index.html','text/html');toast('📥 HTML скачан!');}
function dlF(t){closeOv();const m={css:[code.css,'style.css','text/css'],js:[code.js,'script.js','text/javascript']};dl(m[t][0],m[t][1],m[t][2]);toast('📥 '+m[t][1]+' скачан!');}

// ICON
function loadIcon(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    iconDataUrl=ev.target.result;
    const prev=document.getElementById('iconPreview');
    prev.innerHTML='<img src="'+iconDataUrl+'">';
    toast('🖼 Иконка загружена!');
  };
  reader.readAsDataURL(file);
}

function toggleEmoji(){
  const g=document.getElementById('emojiGrid');
  g.style.display=g.style.display==='none'?'grid':'none';
}

function setEmoji(em){
  selectedEmoji=em; iconDataUrl=null;
  document.getElementById('iconPreview').textContent=em;
  document.querySelectorAll('.eg-btn').forEach(b=>{b.classList.toggle('selected',b.textContent===em);});
  toast('✅ Иконка: '+em);
}

function resetIcon(){
  iconDataUrl=null; selectedEmoji='🚀';
  document.getElementById('iconPreview').textContent='🚀';
  document.querySelectorAll('.eg-btn').forEach(b=>b.classList.remove('selected'));
}

// GENERATE ICON PNG (canvas → base64)
function makeIconPng(size){
  const cv=document.createElement('canvas');
  cv.width=cv.height=size;
  const ctx=cv.getContext('2d');

  if(iconDataUrl){
    return new Promise(res=>{
      const img=new Image();
      img.onload=()=>{
        // rounded rect clip
        const r=size*0.18;
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(size-r,0);
        ctx.quadraticCurveTo(size,0,size,r);
        ctx.lineTo(size,size-r);
        ctx.quadraticCurveTo(size,size,size-r,size);
        ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
        ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
        ctx.closePath(); ctx.clip();
        ctx.drawImage(img,0,0,size,size);
        res(cv.toDataURL('image/png').split(',')[1]);
      };
      img.src=iconDataUrl;
    });
  } else {
    // emoji on dark bg
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,size,size);
    const grad=ctx.createLinearGradient(0,0,size,size);
    grad.addColorStop(0,'#001a22'); grad.addColorStop(1,'#000');
    ctx.fillStyle=grad; ctx.fillRect(0,0,size,size);
    ctx.strokeStyle='#00d4ff'; ctx.lineWidth=size*0.03;
    const r=size*0.12;
    ctx.beginPath();
    ctx.moveTo(r,size*0.03); ctx.lineTo(size-r,size*0.03);
    ctx.quadraticCurveTo(size*0.97,size*0.03,size*0.97,r);
    ctx.lineTo(size*0.97,size-r);
    ctx.quadraticCurveTo(size*0.97,size*0.97,size-r,size*0.97);
    ctx.lineTo(r,size*0.97); ctx.quadraticCurveTo(size*0.03,size*0.97,size*0.03,size-r);
    ctx.lineTo(size*0.03,r); ctx.quadraticCurveTo(size*0.03,size*0.03,r,size*0.03);
    ctx.closePath(); ctx.stroke();
    ctx.font=`${size*0.52}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(selectedEmoji,size/2,size/2+size*0.03);
    return Promise.resolve(cv.toDataURL('image/png').split(',')[1]);
  }
}

// SET STATUS
function setSt(n,txt,pct){
  document.getElementById('sb'+n).innerHTML=txt;
  if(pct!==undefined) document.getElementById('sbBar').style.width=pct+'%';
}

// BUILD APK
async function buildAPK(){
  code[activeTab]=ed.value;
  const name=document.getElementById('appName').value.trim()||'Моё приложение';
  const btn=document.getElementById('goBtn');
  const sb=document.getElementById('statusBox');

  btn.disabled=true; btn.textContent='⏳ Подготовка...';
  sb.classList.add('show');
  setSt(1,'⚙️ <b>Генерируем иконки...</b>','',5);
  setSt(2,''); setSt(3,'');

  try {
    // Generate icons
    const [ico192, ico512] = await Promise.all([makeIconPng(192), makeIconPng(512)]);
    setSt(1,'✅ Иконки готовы',10);

    // Build full HTML
    setSt(2,'⚙️ <b>Собираем HTML...</b>',30);
    const html=buildHTML();

    // Build ZIP
    setSt(2,'✅ HTML готов — собираем ZIP...',50);
    const zip=new JSZip();

    // manifest.json
    const manifest={
      name:name, short_name:name.slice(0,12),
      description:'Создано в Denisia Pages',
      start_url:'./index.html', display:'standalone',
      background_color:'#000000', theme_color:'#00d4ff',
      orientation:'portrait-primary',
      icons:[
        {src:'icon-192.png',sizes:'192x192',type:'image/png',purpose:'any maskable'},
        {src:'icon-512.png',sizes:'512x512',type:'image/png',purpose:'any maskable'}
      ]
    };

    // service worker
    const sw=`const C='denisia-v2',F=['./','./index.html'];
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(F)).then(()=>self.skipWaiting())));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./index.html')))));`;

    // Inject manifest + SW into HTML
    let finalHtml = html;
    if(!finalHtml.includes('manifest.json')){
      finalHtml=finalHtml.replace('</head>','<link rel="manifest" href="manifest.json">\n</head>');
    }
    if(!finalHtml.includes('serviceWorker')){
      finalHtml=finalHtml.replace('</body>',`<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');<\/script>\n</body>`);
    }

    const readme=`DENISIA PAGES — ТВОЙ APK
========================

КАК УСТАНОВИТЬ:
1. Залей файлы на хостинг (Netlify.com — бесплатно, просто перетащи папку)
2. Открой сайт в Chrome на Android
3. Меню ⋮ → "Добавить на главный экран"
→ Работает как приложение!

ИЛИ через AppsGeyser:
1. Зайди на appsgeyser.com
2. Загрузи index.html
3. Скачай APK файл`;

    zip.file('index.html', finalHtml);
    zip.file('manifest.json', JSON.stringify(manifest,null,2));
    zip.file('sw.js', sw);
    zip.file('icon-192.png', ico192, {base64:true});
    zip.file('icon-512.png', ico512, {base64:true});
    zip.file('README.txt', readme);

    setSt(2,'✅ ZIP собран',70);
    setSt(3,'⏬ <b>Скачиваем архив...</b>',85);

    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=name.replace(/\s+/g,'_')+'_app.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);

    setSt(3,`✅ <b>ZIP скачан!</b> Теперь: <a href="https://appsgeyser.com/create-app/1" target="_blank">открыть AppsGeyser →</a> загрузи index.html → получи APK`,100);

    // Also copy HTML to clipboard and open AppsGeyser
    try{ await navigator.clipboard.writeText(finalHtml); } catch(e){}
    setTimeout(()=>{ window.open('https://appsgeyser.com/create-app/1','_blank'); },800);

    btn.textContent='✅ ГОТОВО! ОТКРЫВАЕМ APPSGEYSER...';
    toast('📦 ZIP скачан! Открываем AppsGeyser...');

    setTimeout(()=>{
      btn.textContent='▶▶ СОБРАТЬ APK СНОВА';
      btn.disabled=false;
    },4000);

  } catch(err){
    setSt(1,'❌ Ошибка: '+err.message,'',0);
    btn.textContent='▶▶ СОБРАТЬ APK СЕЙЧАС';
    btn.disabled=false;
    toast('Ошибка: '+err.message, true);
  }
}

// RESIZER
const resizer=document.getElementById('resizer');
const edSide=document.getElementById('edSide');
const mainEl=document.querySelector('.main');
let drag=false;
resizer.addEventListener('mousedown',()=>{drag=true;document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
document.addEventListener('mousemove',e=>{if(!drag) return;const r=mainEl.getBoundingClientRect();const p=(e.clientX-r.left)/r.width*100;if(p>15&&p<85) edSide.style.width=p+'%';});
document.addEventListener('mouseup',()=>{drag=false;document.body.style.cursor='';document.body.style.userSelect='';});

function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' err':'');
  setTimeout(()=>t.className='toast',3500);
}
